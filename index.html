<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Episode Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f13;
      --bg-card:    #1a1a24;
      --border:     #2a2a38;
      --text:       #e8e8f0;
      --text-head:  #ffffff;
      --text-muted: #6b6b80;
      --input-bg:   #0f0f13;
      --btn-bg:     #2a2a38;
      --btn-color:  #9999b3;
      --btn-hover:  #35354a;
      --accent:     #5b5bf0;
      --accent-hover: #4a4add;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f2f2f7;
        --bg-card:    #ffffff;
        --border:     #d1d1db;
        --text:       #1c1c1e;
        --text-head:  #000000;
        --text-muted: #8e8e9a;
        --input-bg:   #f2f2f7;
        --btn-bg:     #e5e5ea;
        --btn-color:  #5a5a72;
        --btn-hover:  #d1d1db;
        --accent:     #5b5bf0;
        --accent-hover: #4a4add;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: var(--text-head);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-head);
    }

    .card-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-head);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }

    .next-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 14px;
      letter-spacing: 0.2px;
    }

    .next-btn:hover { background: var(--accent-hover); }
    .next-btn:active { transform: scale(0.98); }

    .save-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .save-btn {
      background: var(--btn-bg);
      color: var(--btn-color);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .save-btn:hover:not(:disabled) { background: var(--btn-hover); color: var(--text); }
    .save-btn:active:not(:disabled) { transform: scale(0.98); }
    .save-btn:disabled { opacity: 0.35; cursor: default; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--btn-bg);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <h1>Episode Tracker</h1>
  <p class="subtitle">Pick up where you left off.</p>

  <div class="cards" id="cards"></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://yvrpfmsckwitwpnnluyl.supabase.co',
      'sb_publishable_DreRUXTzLAE1oRD2rgPIhQ_qR9q3kPA'
    );

    const shows = [
      { id: 'the-big-bang-theory', name: 'The Big Bang Theory', icon: '🔭', color: '#f0a500' },
      { id: 'the-office',          name: 'The Office',          icon: '📎', color: '#4fa3e0' },
      { id: 'sherlock',            name: 'Sherlock',            icon: '🔍', color: '#a0b4c8' },
      { id: 'szadz',               name: 'Szadź',               icon: '❄️', color: '#60c8e0' },
      { id: 'chylka',              name: 'Chyłka',              icon: '⚖️', color: '#c06070' },
      { id: 'mlody-szeldon',       name: 'Młody Szeldon',       icon: '🧠', color: '#9b59b6' },
      { id: 'ranczo',              name: 'Ranczo',              icon: '🌾', color: '#70b060' },
    ];

    let progress = {};

    async function load() {
      const { data, error } = await supabase.from('progress').select();
      if (error) { showToast('Failed to load progress.'); return; }
      progress = Object.fromEntries((data || []).map(r => [r.show_id, { season: r.season, episode: r.episode }]));
      render();
    }

    function render() {
      const container = document.getElementById('cards');
      container.innerHTML = '';

      shows.forEach(show => {
        const p = progress[show.id] || { season: 1, episode: 1 };
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header">
            <div class="card-icon" style="background:${show.color}22; color:${show.color}">${show.icon}</div>
            <div>
              <div class="card-title">${show.name}</div>
              <div class="card-subtitle" id="sub-${show.id}">Last watched: S${String(p.season).padStart(2,'0')}E${String(p.episode).padStart(2,'0')}</div>
            </div>
          </div>
          <button class="next-btn" data-id="${show.id}" data-name="${show.name}">▶ Next Episode</button>
          <div class="save-row">
            <div>
              <label>Season</label>
              <input type="number" id="s-${show.id}" value="${p.season}" min="1" />
            </div>
            <div>
              <label>Episode</label>
              <input type="number" id="e-${show.id}" value="${p.episode}" min="1" />
            </div>
            <button class="save-btn" data-id="${show.id}" data-name="${show.name}" disabled>Set</button>
          </div>
        `;
        container.appendChild(card);
      });

      document.querySelectorAll('.next-btn').forEach(btn => {
        btn.addEventListener('click', () => nextEpisode(btn.dataset.id, btn.dataset.name));
      });
      document.querySelectorAll('.save-btn').forEach(btn => {
        btn.addEventListener('click', () => save(btn.dataset.id, btn.dataset.name));
      });
      document.querySelectorAll('.save-row input').forEach(input => {
        input.addEventListener('input', () => {
          const id = input.id.slice(2); // strip "s-" or "e-"
          updateSetBtn(id);
        });
      });
    }

    function updateSetBtn(id) {
      const cur = progress[id] || { season: 1, episode: 1 };
      const s = parseInt(document.getElementById(`s-${id}`).value, 10);
      const e = parseInt(document.getElementById(`e-${id}`).value, 10);
      const unchanged = s === parseInt(cur.season, 10) && e === parseInt(cur.episode, 10);
      document.querySelector(`.save-btn[data-id="${id}"]`).disabled = unchanged || !s || !e;
    }

    async function nextEpisode(id, name) {
      const cur = progress[id] || { season: 1, episode: 1 };
      const season  = parseInt(cur.season, 10);
      const episode = parseInt(cur.episode, 10) + 1;

      const { error } = await supabase.from('progress').upsert({ show_id: id, season, episode });
      if (error) { showToast('Failed to save. Try again.'); return; }

      progress[id] = { season, episode };
      document.getElementById(`sub-${id}`).textContent =
        `Last watched: S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`;
      document.getElementById(`s-${id}`).value = season;
      document.getElementById(`e-${id}`).value = episode;
      updateSetBtn(id);
      showToast(`${name} → S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`);
    }

    async function save(id, name) {
      const season  = parseInt(document.getElementById(`s-${id}`).value, 10);
      const episode = parseInt(document.getElementById(`e-${id}`).value, 10);

      if (!season || !episode || season < 1 || episode < 1) {
        showToast('Please enter valid season and episode numbers.');
        return;
      }

      const { error } = await supabase.from('progress').upsert({ show_id: id, season, episode });
      if (error) { showToast('Failed to save. Try again.'); return; }

      progress[id] = { season, episode };
      document.getElementById(`sub-${id}`).textContent =
        `Last watched: S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`;
      updateSetBtn(id);
      showToast(`${name} saved.`);
    }

    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    load();
  </script>
</body>
</html>
